<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahoo Finance API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #667eea;
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
        button:hover {
            opacity: 0.9;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
        }
        .success {
            color: #10b981;
            font-weight: bold;
        }
        .error {
            color: #ef4444;
            font-weight: bold;
        }
        .loading {
            color: #667eea;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Yahoo Finance API Test</h1>
        <p style="text-align: center; color: #666;">
            Click the button below to fetch real-time stock data from Yahoo Finance
        </p>
        <button onclick="testAPI()">Test Yahoo Finance API</button>
        <div id="result"></div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading">⏳ Fetching data from Yahoo Finance...</div>';
            
            const symbols = ['IBM', 'TQQQ', 'SPY', 'NVDA', 'AMD', 'MU', 'C', 'AAL', 'TSLA', 'KHC', 'U', 'NET', 'FSLR', 'AAPL'];
            const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
            const YAHOO_FINANCE_API = 'https://query1.finance.yahoo.com/v8/finance/chart/';
            
            try {
                let output = '<div class="success">✅ API TEST SUCCESSFUL!</div>\n\n';
                output += '═══════════════════════════════════════\n\n';
                
                for (const symbol of symbols) {
                    try {
                        let response;
                        let data;
                        let method = 'Direct API';
                        
                        // Try direct API first
                        try {
                            response = await fetch(`${YAHOO_FINANCE_API}${symbol}?interval=1d&range=1d`);
                            if (response.ok) {
                                data = await response.json();
                            } else {
                                throw new Error('Direct failed');
                            }
                        } catch (directError) {
                            // Use CORS proxy as fallback
                            method = 'CORS Proxy';
                            const proxyUrl = `${CORS_PROXY}${encodeURIComponent(YAHOO_FINANCE_API + symbol + '?interval=1d&range=1d')}`;
                            response = await fetch(proxyUrl);
                            
                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                            
                            data = await response.json();
                        }
                        
                        const quote = data.chart.result[0];
                        const meta = quote.meta;
                        
                        const currentPrice = meta.regularMarketPrice;
                        const previousClose = meta.chartPreviousClose || meta.previousClose;
                        const change = currentPrice - previousClose;
                        const changePercent = (change / previousClose) * 100;
                        
                        output += `📊 ${symbol} - ${getCompanyName(symbol)}\n`;
                        output += `   Price: $${currentPrice.toFixed(2)}\n`;
                        output += `   Change: ${change >= 0 ? '+' : ''}${change.toFixed(2)} (${change >= 0 ? '+' : ''}${changePercent.toFixed(2)}%)\n`;
                        output += `   Exchange: ${meta.exchangeName}\n`;
                        output += `   Currency: ${meta.currency}\n`;
                        output += `   Method: ${method}\n\n`;
                        
                    } catch (error) {
                        output += `❌ ${symbol}: Failed to fetch - ${error.message}\n\n`;
                    }
                }
                
                output += '═══════════════════════════════════════\n';
                output += `\n✨ Test completed at ${new Date().toLocaleTimeString()}`;
                
                resultDiv.innerHTML = `<pre>${output}</pre>`;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">❌ API TEST FAILED!</div>
                    <pre>
Error: ${error.message}

Possible causes:
1. CORS policy blocking the request
2. Network connectivity issues
3. Yahoo Finance API temporarily unavailable

The website now uses a CORS proxy as fallback.
If both methods fail, sample data will be displayed.
                    </pre>
                `;
            }
        }
        
        function getCompanyName(symbol) {
            const companies = {
                'IBM': 'IBM Corporation',
                'TQQQ': 'ProShares UltraPro QQQ',
                'SPY': 'SPDR S&P 500 ETF',
                'NVDA': 'NVIDIA Corporation',
                'AMD': 'Advanced Micro Devices',
                'MU': 'Micron Technology',
                'C': 'Citigroup Inc.',
                'AAL': 'American Airlines',
                'TSLA': 'Tesla Inc.',
                'KHC': 'Kraft Heinz Company',
                'U': 'Unity Software Inc.',
                'NET': 'Cloudflare Inc.',
                'FSLR': 'First Solar Inc.',
                'AAPL': 'Apple Inc.'
            };
            return companies[symbol] || symbol;
        }
    </script>
</body>
</html>
